<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealBridge - My Donations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); }
        
        .navbar-glass {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2ecc71, #27ae60, #1abc9c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-link-modern {
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            color: #2c3e50;
        }
        
        .nav-link-modern:hover {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white !important;
            transform: translateY(-2px);
        }
        
        .donation-card {
            background: white;
            border-radius: 20px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-left: 5px solid #2ecc71;
        }
        
        .donation-card:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-active { background: #2ecc71; color: white; }
        .status-purchased { background: #e67e22; color: white; }
        .status-claimed { background: #3498db; color: white; }
        
        .filter-btn {
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            margin: 0.2rem;
            transition: all 0.3s ease;
        }
        
        .filter-btn.active {
            background: #2ecc71;
            color: white;
        }
        
        footer {
            background: #1a1a2e;
            color: white;
            padding: 2rem;
            margin-top: 3rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-glass">
        <div class="container-fluid">
            <a class="navbar-brand brand" href="index.html"><i class="fas fa-hand-holding-heart"></i> MealBridge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="donate.html"><i class="fas fa-donate"></i> Donate</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="request.html"><i class="fas fa-clipboard-list"></i> Request</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="my-donation.html"><i class="fas fa-box"></i> My Donations</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="impact.html"><i class="fas fa-chart-line"></i> Impact Hub</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern" href="education.html"><i class="fas fa-graduation-cap"></i> Learn</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-modern active" href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
            <h2><i class="fas fa-box"></i> My Donations History</h2>
            <button class="btn btn-success" onclick="location.href='donate.html'"><i class="fas fa-plus"></i> New Donation</button>
        </div>
        
        <div class="mb-3">
            <button class="filter-btn btn btn-outline-success active" data-filter="all">All</button>
            <button class="filter-btn btn btn-outline-success" data-filter="active">Active</button>
            <button class="filter-btn btn btn-outline-success" data-filter="purchased">Purchased</button>
            <button class="filter-btn btn btn-outline-success" data-filter="claimed">Claimed</button>
        </div>
        
        <div id="donationsList"></div>
    </div>

    <footer>
        <p>© 2026 MealBridge | Together Against Hunger & Food Waste</p>
    </footer>

    <script>
        let currentFilter = 'all';
        
        function loadDonations() {
            const donations = JSON.parse(localStorage.getItem('donations') || '[]');
            let filteredDonations = donations;
            
            if (currentFilter !== 'all') {
                filteredDonations = donations.filter(d => d.status === currentFilter);
            }
            
            const container = document.getElementById('donationsList');
            
            if (filteredDonations.length === 0) {
                container.innerHTML = '<div class="text-center py-5 bg-white rounded-4"><i class="fas fa-box-open fa-3x text-muted"></i><p class="mt-3">No donations found. Start donating today!</p></div>';
                return;
            }
            
            container.innerHTML = filteredDonations.map(d => `
                <div class="donation-card">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <h5 class="fw-bold mb-1">${escapeHtml(d.foodItem)}</h5>
                            <p class="text-muted small mb-0">${new Date(d.timestamp).toLocaleDateString()}</p>
                        </div>
                        <div class="col-md-3">
                            <i class="fas fa-balance-scale"></i> ${escapeHtml(d.quantity)}<br>
                            <i class="fas fa-map-marker-alt"></i> ${escapeHtml(d.location)}
                        </div>
                        <div class="col-md-3">
                            <span class="status-badge status-${d.status === 'active' ? 'active' : (d.status === 'purchased' ? 'purchased' : 'claimed')}">
                                ${d.status === 'active' ? '🟢 Active' : (d.status === 'purchased' ? '🟠 Purchased' : '🔵 Claimed')}
                            </span>
                        </div>
                        <div class="col-md-2 text-end">
                            ${d.status === 'active' ? `<button class="btn btn-sm btn-danger" onclick="deleteDonation(${d.id})"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.deleteDonation = function(id) {
            if (confirm('Are you sure you want to remove this donation?')) {
                let donations = JSON.parse(localStorage.getItem('donations') || '[]');
                donations = donations.filter(d => d.id !== id);
                localStorage.setItem('donations', JSON.stringify(donations));
                loadDonations();
                
                const activities = JSON.parse(localStorage.getItem('activities') || '[]');
                activities.unshift({
                    timestamp: new Date().toISOString(),
                    action: 'removed',
                    details: `A donation was removed`,
                    user: 'System',
                    icon: '🗑️'
                });
                localStorage.setItem('activities', JSON.stringify(activities.slice(0, 50)));
            }
        };
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                loadDonations();
            });
        });
        
        loadDonations();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
